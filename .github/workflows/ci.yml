name: Containerized Cangjie CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: cangjie-ci:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Cangjie unit tests in container
        run: |
          docker run --rm -v $PWD:/workspace cangjie-ci:latest bash -c "
            echo '=== Cangjie Containerized CI ==='
            cjc --version
            echo ''
            echo '=== Building project ==='
            cjpm build
            echo ''
            echo '=== Running unit tests ==='
            cjpm test
          "
